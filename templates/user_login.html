{% extends "base.html" %}

{% block title %}用户登录 - 图书借阅管理系统{% endblock %}

{% block content %}
<div class="login-form-container">
    <h2>用户登录</h2>
    <form method="POST" class="login-form">
        <div class="form-group">
            <label for="user_id">用户ID</label>
            <input type="number" id="user_id" name="user_id" required autofocus>
        </div>
        <div class="form-group">
            <label for="password">密码</label>
            <input type="password" id="password" name="password" required>
        </div>
        {% if error %}
        <div class="error-message">{{ error }}</div>
        {% endif %}
        <button type="submit" class="btn btn-primary">登录</button>
        <a href="{{ url_for('auth.login') }}" class="btn btn-secondary">返回</a>
    </form>
    <div style="text-align: center; margin-top: 15px;">
        <span style="color: #666;">还没有账号？</span>
        <a href="{{ url_for('auth.register') }}" style="color: #4CAF50; font-weight: 500;">注册新账号</a>
    </div>
</div>

<style>
.login-form-container {
    max-width: 400px;
    margin: 50px auto;
    padding: 30px;
    border: 2px solid #e0e0e0;
    border-radius: 8px;
    background: #fff;
}
.login-form-container h2 {
    text-align: center;
    color: #4CAF50;
    margin-bottom: 30px;
}
.login-form .form-group {
    margin-bottom: 20px;
}
.login-form label {
    display: block;
    margin-bottom: 8px;
    color: #333;
    font-weight: 500;
}
.login-form input {
    width: 100%;
    padding: 10px;
    border: 1px solid #ddd;
    border-radius: 4px;
    font-size: 14px;
}
.login-form input:focus {
    outline: none;
    border-color: #4CAF50;
}
.login-form .error-message {
    background: #ffebee;
    color: #c62828;
    padding: 10px;
    border-radius: 4px;
    margin-bottom: 20px;
    text-align: center;
}
.login-form button,
.login-form .btn {
    width: 100%;
    margin-top: 10px;
}
</style>
{% endblock %}
