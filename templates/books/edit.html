{% extends "base.html" %}
{% block title %}编辑图书{% endblock %}
{% block content %}
<div class="form-container">
    <h2>编辑图书 #{{ book.book_id }}</h2>
    {% if error %}
    <div class="alert alert-error">{{ error }}</div>
    {% endif %}
    <form method="POST" class="form">
        <div class="form-group">
            <label for="isbn">ISBN *</label>
            <input type="text" id="isbn" name="isbn" required value="{{ book.isbn }}">
        </div>
        <div class="form-group">
            <label for="title">书名 *</label>
            <input type="text" id="title" name="title" required value="{{ book.title }}">
        </div>
        <div class="form-group">
            <label for="author">作者</label>
            <input type="text" id="author" name="author" value="{{ book.author or '' }}">
        </div>
        <div class="form-group">
            <label for="publisher">出版社</label>
            <input type="text" id="publisher" name="publisher" value="{{ book.publisher or '' }}">
        </div>
        <div class="form-group">
            <label for="pub_year">出版年份</label>
            <input type="number" id="pub_year" name="pub_year" value="{{ book.pub_year or '' }}">
        </div>
        <div class="form-group">
            <label for="cat_id">分类 *</label>
            <select id="cat_id" name="cat_id" required>
                {% for c in categories %}
                <option value="{{ c.cat_id }}" {% if c.cat_id == book.cat_id %}selected{% endif %}>{{ c.cat_name }} ({{ c.cat_id }})</option>
                {% endfor %}
            </select>
        </div>
        <div class="form-group">
            <label for="total_stock">总库存</label>
            <input type="number" id="total_stock" name="total_stock" value="{{ book.total_stock }}" min="0">
        </div>
        <div class="form-group">
            <label for="shelf_location">架位号</label>
            <input type="text" id="shelf_location" name="shelf_location" value="{{ book.shelf_location or '' }}">
        </div>
        <div class="form-actions">
            <button type="submit" class="btn btn-primary">保存</button>
            <a href="{{ url_for('books.list_books') }}" class="btn btn-outline">返回</a>
        </div>
    </form>
</div>
{% endblock %}
