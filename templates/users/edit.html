{% extends "base.html" %}
{% block title %}编辑用户{% endblock %}
{% block content %}
<div class="form-container">
    <h2>编辑用户 #{{ user.user_id }}</h2>
    {% if error %}
    <div class="alert alert-error">{{ error }}</div>
    {% endif %}
    <form method="POST" class="form">
        <div class="form-group">
            <label for="name">姓名</label>
            <input type="text" id="name" name="name" required value="{{ user.name }}">
        </div>
        <div class="form-group">
            <label for="current_password">当前密码</label>
            <input type="text" id="current_password" value="{{ user.password }}" readonly class="readonly-input">
            <small class="form-text">当前密码：{{ user.password }}</small>
        </div>
        <div class="form-group">
            <label for="password">新密码（留空则不修改）</label>
            <input type="password" id="password" name="password" placeholder="留空则不修改密码">
        </div>
        <div class="form-group">
            <label for="user_type">用户类型</label>
            <select id="user_type" name="user_type" required>
                {% for ut in user_type_names %}
                <option value="{{ ut }}" {% if ut == user.user_type %}selected{% endif %}>{{ ut }}</option>
                {% endfor %}
            </select>
        </div>
        <div class="form-group">
            <label for="max_borrow">最大借阅数量</label>
            <input type="number" id="max_borrow" name="max_borrow" required value="{{ user.max_borrow }}" min="1">
        </div>
        <div class="form-group">
            <label for="days_limit">借阅期限（天）</label>
            <input type="number" id="days_limit" name="days_limit" required value="{{ user.days_limit }}" min="1">
        </div>
        <div class="form-group">
            <label for="penalty_per_day">超期日违约金（元）</label>
            <input type="number" id="penalty_per_day" name="penalty_per_day" required step="0.01" value="{{ '%.2f'|format(user.penalty_per_day|float) }}">
        </div>
        <div class="form-actions">
            <button type="submit" class="btn btn-primary">保存</button>
            <a href="{{ url_for('users.list_users') }}" class="btn btn-outline">返回</a>
        </div>
    </form>
</div>
{% endblock %}
